<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☀️ Wolters Summer Vacation Points</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>

/* ── VARIABLES ── */
:root {
  --sun: #FFD93D;
  --coral: #FF6B6B;
  --orange: #FF9A3C;
  --mint: #6BCB77;
  --sky: #4FC3F7;
  --purple: #C77DFF;
  --white: #FFFDF7;
  --bg: #FFF8E7;
  --dark: #1A1A2E;
  --card-border: #F0EDE8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 10% 20%, rgba(255,217,61,0.12) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(79,195,247,0.12) 0%, transparent 40%);
  min-height: 100vh;
  color: var(--dark);
}

/* ── HEADER ── */
header {
  background: linear-gradient(135deg, #FF6B6B 0%, #FF9A3C 40%, #FFD93D 100%);
  padding: 26px 20px 18px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(255,107,107,0.3);
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.04) 10px, rgba(255,255,255,0.04) 20px);
}
header h1 {
  font-family: 'Boogaloo', cursive;
  font-size: clamp(1.6rem, 5vw, 2.8rem);
  color: white;
  text-shadow: 3px 3px 0 rgba(0,0,0,0.12);
  position: relative;
}
header p {
  color: rgba(255,255,255,0.9);
  font-weight: 700;
  font-size: 0.92rem;
  margin-top: 4px;
  position: relative;
}
.spin { display: inline-block; animation: spin 10s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── STATUS BAR ── */
#status-bar {
  background: rgba(255,255,255,0.85);
  text-align: center;
  padding: 6px 16px;
  font-size: 0.78rem;
  font-weight: 800;
  color: #888;
  border-bottom: 2px solid #FFE0B2;
  letter-spacing: 0.3px;
}
#status-bar.error { color: #D32F2F; background: #FFF0F0; }
#status-bar.ok { color: #2E7D32; }

/* ── NAV ── */
nav {
  display: flex;
  background: white;
  border-bottom: 3px solid #FFE0B2;
  overflow-x: auto;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  -webkit-overflow-scrolling: touch;
}
nav button {
  font-family: 'Boogaloo', cursive;
  font-size: 1rem;
  padding: 13px 18px;
  border: none;
  background: none;
  cursor: pointer;
  color: #999;
  white-space: nowrap;
  border-bottom: 4px solid transparent;
  margin-bottom: -3px;
  transition: all 0.2s;
}
nav button:hover { background: #FFF8F0; }
nav button.active { color: var(--dark); border-bottom-color: var(--orange); }

/* ── MAIN ── */
main {
  max-width: 920px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

/* ── PANELS ── */
.panel { display: none; }
.panel.active { display: block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* ── CARDS ── */
.card {
  background: white;
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  border: 2px solid var(--card-border);
}
.section-title {
  font-family: 'Boogaloo', cursive;
  font-size: 1.25rem;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.tag {
  font-size: 0.65rem;
  font-weight: 800;
  padding: 2px 9px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.tag-required { background: #FFE0E0; color: #C62828; }
.tag-bonus    { background: #FFF3E0; color: #E65100; }
.tag-gift     { background: #E8F5E9; color: #2E7D32; }

/* ── NOTE BOX ── */
.note {
  background: #FFFDE7;
  border-left: 4px solid var(--sun);
  padding: 8px 12px;
  border-radius: 0 8px 8px 0;
  font-size: 0.82rem;
  font-weight: 700;
  color: #666;
  margin-bottom: 12px;
}

/* ── CHORE ROWS ── */
.chore-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 12px;
  margin-bottom: 5px;
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}
.chore-row:hover { background: #FFF3E0; }
.chore-row.done { background: #F0FFF4; }
.chore-row.done .chore-label { text-decoration: line-through; color: #AAA; }
.check-box {
  width: 26px; height: 26px;
  border-radius: 8px;
  border: 2.5px solid #DDD;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem;
  background: white;
  transition: all 0.2s;
}
.check-box.ticked { background: var(--mint); border-color: var(--mint); color: white; }
.chore-label { flex: 1; font-weight: 700; font-size: 0.92rem; }
.pts-pill {
  font-weight: 800;
  font-size: 0.75rem;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
  background: var(--sun);
  color: var(--dark);
}
.pts-pill.med  { background: #FFB347; }
.pts-pill.hard { background: #FF8C69; color: white; }

/* ── PROGRESS ── */
.progress-wrap { margin-top: 12px; }
.progress-labels {
  display: flex;
  justify-content: space-between;
  font-size: 0.76rem;
  font-weight: 800;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 5px;
}
.progress-bg  { background: #EEE; border-radius: 20px; height: 10px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 20px; transition: width 0.4s ease; }

/* ── UNLOCK BANNER ── */
.unlock-banner {
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 0.84rem;
  font-weight: 700;
  margin-top: 10px;
  border: 2px dashed;
}
.unlock-banner.locked   { background: #FFF8E7; border-color: #FFB347; color: #E65100; }
.unlock-banner.unlocked { background: #F0FFF4; border-color: var(--mint); color: #2E7D32; }

/* ── KID HEADER ── */
.kid-header {
  border-radius: 20px;
  padding: 18px 22px;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 18px;
  color: white;
  box-shadow: 0 6px 20px rgba(0,0,0,0.12);
}
.kid-avatar {
  width: 58px; height: 58px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  border: 3px solid rgba(255,255,255,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
  flex-shrink: 0;
}
.kid-name { font-family: 'Boogaloo', cursive; font-size: 1.7rem; }
.kid-age  { font-size: 0.8rem; font-weight: 700; opacity: 0.85; }
.kid-pts-box {
  margin-left: auto;
  text-align: center;
  background: rgba(255,255,255,0.2);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 14px;
  padding: 10px 18px;
}
.kid-pts-num   { font-family: 'Boogaloo', cursive; font-size: 2.2rem; line-height: 1; display: block; }
.kid-pts-label { font-size: 0.68rem; font-weight: 800; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; }

/* ── BONUS CHORE CARDS ── */
.bonus-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 10px;
  margin-bottom: 18px;
}
.bonus-card {
  background: #FFFDF7;
  border: 2px solid #FFE0B2;
  border-radius: 14px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.2s;
}
.bonus-card.claimed { background: #F0FFF4; border-color: var(--mint); }
.bonus-card.claimed .bonus-label { text-decoration: line-through; color: #AAA; }
.bonus-check {
  width: 26px; height: 26px;
  border-radius: 8px;
  border: 2.5px solid #DDD;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem;
  background: white;
  transition: all 0.2s;
}
.bonus-card.claimed .bonus-check { background: var(--mint); border-color: var(--mint); color: white; }
.bonus-label { flex: 1; font-weight: 700; font-size: 0.85rem; }
.who-select {
  font-family: 'Nunito', sans-serif;
  font-size: 0.73rem;
  font-weight: 700;
  border: 1.5px solid #DDD;
  border-radius: 8px;
  padding: 3px 6px;
  background: white;
  cursor: pointer;
}

/* ── REWARDS ── */
.reward-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
}
.reward-card {
  background: white;
  border: 2px solid #EEE;
  border-radius: 14px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  transition: all 0.2s;
}
.reward-card:hover { border-color: var(--purple); transform: translateY(-2px); box-shadow: 0 4px 14px rgba(199,125,255,0.14); }
.reward-icon { font-size: 1.8rem; }
.reward-name { font-weight: 800; font-size: 0.92rem; }
.reward-desc { font-size: 0.76rem; color: #888; font-weight: 600; line-height: 1.4; flex: 1; }
.reward-cost {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
}
.cost-pill {
  font-family: 'Boogaloo', cursive;
  font-size: 1.1rem;
  background: var(--sun);
  padding: 2px 12px;
  border-radius: 20px;
  border: 2px solid rgba(0,0,0,0.07);
}
.cost-label { font-size: 0.72rem; font-weight: 800; color: #AAA; }

/* ── SCOREBOARD ── */
.score-row {
  background: white;
  border-radius: 18px;
  padding: 18px 22px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 18px;
  box-shadow: 0 3px 14px rgba(0,0,0,0.06);
  border: 2px solid var(--card-border);
}
.score-avatar {
  width: 50px; height: 50px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.7rem;
  flex-shrink: 0;
}
.score-name { font-family: 'Boogaloo', cursive; font-size: 1.25rem; flex: 1; }
.score-bar-wrap { flex: 2; }
.score-bar-bg  { background: #F0EDE8; border-radius: 20px; height: 14px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 20px; transition: width 0.5s ease; }
.score-pts {
  font-family: 'Boogaloo', cursive;
  font-size: 1.5rem;
  min-width: 72px;
  text-align: right;
}
.score-pts span { font-size: 0.68rem; font-family: 'Nunito', sans-serif; font-weight: 800; color: #AAA; display: block; }

/* ── TIER HEADING ── */
.tier-heading {
  font-family: 'Boogaloo', cursive;
  font-size: 1.05rem;
  margin-bottom: 10px;
  padding-bottom: 4px;
  border-bottom: 2px dashed #EEE;
}

/* ── TRANSACTION LOG ── */
.log-filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.filter-btn {
  font-family: 'Boogaloo', cursive;
  font-size: 0.95rem;
  padding: 6px 16px;
  border-radius: 20px;
  border: 2px solid #EEE;
  background: white;
  color: #999;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn.active { border-color: var(--orange); color: var(--dark); background: #FFF8F0; }
.filter-btn.penelope.active { border-color: #FF6B9D; background: #FFF0F6; color: #FF6B9D; }
.filter-btn.axel.active     { border-color: #4FC3F7; background: #F0FAFF; color: #4FC3F7; }
.filter-btn.truett.active   { border-color: #6BCB77; background: #F0FFF4; color: #6BCB77; }

.log-entry {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 12px;
  margin-bottom: 6px;
  border: 1.5px solid #F0EDE8;
  background: white;
  transition: background 0.15s;
}
.log-entry:hover { background: #FFFDF7; }
.log-kid-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.log-emoji { font-size: 1.1rem; flex-shrink: 0; }
.log-desc  { flex: 1; font-weight: 700; font-size: 0.88rem; }
.log-date  { font-size: 0.75rem; color: #AAA; font-weight: 700; white-space: nowrap; }
.log-pts   { font-family: 'Boogaloo', cursive; font-size: 1.1rem; min-width: 52px; text-align: right; }
.log-pts.positive { color: #2E7D32; }
.log-pts.negative { color: #C62828; }

.empty-log {
  text-align: center;
  padding: 40px 20px;
  color: #CCC;
  font-family: 'Boogaloo', cursive;
  font-size: 1.2rem;
}

/* ── DISCRETIONARY AWARD ── */
.award-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.award-row {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.award-input {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  border: 2px solid #EEE;
  border-radius: 12px;
  padding: 8px 14px;
  outline: none;
  transition: border-color 0.2s;
  background: white;
}
.award-input:focus { border-color: var(--orange); }
.award-input.desc  { flex: 1; min-width: 180px; }
.award-input.pts   { width: 80px; text-align: center; }
.kid-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 800;
  font-size: 0.88rem;
  padding: 7px 14px;
  border-radius: 12px;
  border: 2px solid #EEE;
  background: white;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.kid-toggle.selected.penelope { border-color: #FF6B9D; background: #FFF0F6; color: #FF6B9D; }
.kid-toggle.selected.axel     { border-color: #4FC3F7; background: #F0FAFF; color: #4FC3F7; }
.kid-toggle.selected.truett   { border-color: #6BCB77; background: #F0FFF4; color: #6BCB77; }
.award-btn {
  font-family: 'Boogaloo', cursive;
  font-size: 1.05rem;
  background: linear-gradient(135deg, #FF9A3C, #FFD93D);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 10px 24px;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(255,154,60,0.3);
  transition: all 0.2s;
  width: 100%;
}
.award-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(255,154,60,0.4); }
.award-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── RESET BTN ── */
.reset-btn {
  background: none;
  border: 2px solid #EEE;
  border-radius: 10px;
  padding: 8px 16px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.82rem;
  color: #AAA;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
}
.reset-btn:hover { border-color: var(--coral); color: var(--coral); }

/* ── LOADING ── */
.loading {
  text-align: center;
  padding: 60px 20px;
  font-family: 'Boogaloo', cursive;
  font-size: 1.4rem;
  color: #AAA;
}

/* ══════════════════════════════════════════════════
   PRINT STYLES — Weekly grid layout per kid
   ══════════════════════════════════════════════════ */

/* Screen: hide print-only elements */
.print-only { display: none !important; }
.print-kid-title { display: none; }

@media print {
  @page { size: letter portrait; margin: 0.55in 0.6in; }

  body { background: white !important; }
  header, nav, #status-bar, .reset-btn, .who-select,
  .score-bar-wrap, .progress-wrap, .unlock-banner,
  .note, #panel-award, #panel-log,
  #panel-scoreboard, #panel-bonus,
  .screen-only { display: none !important; }

  /* Show print-only elements */
  .print-only { display: block !important; }

  /* Show all kid panels + rewards */
  .panel { display: block !important; page-break-after: always; }
  #panel-rewards { page-break-after: avoid; }

  main { padding: 0; max-width: 100%; }

  /* ── PRINT KID HEADER ── */
  .print-kid-title { display: block !important; }
  .print-header-block {
    display: flex !important;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
    border-bottom: 4px solid #DDD;
    padding-bottom: 14px;
  }
  .print-header-emoji {
    font-size: 2.8rem;
    line-height: 1;
  }
  .print-header-text h2 {
    font-family: 'Boogaloo', cursive;
    font-size: 26pt;
    color: var(--dark);
    line-height: 1;
  }
  .print-header-text p {
    font-size: 9pt;
    font-weight: 700;
    color: #888;
    margin-top: 2px;
  }
  .print-week-box {
    margin-left: auto;
    border: 2px solid #DDD;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 9pt;
    font-weight: 800;
    color: #888;
    text-align: center;
    min-width: 120px;
  }
  .print-week-box span {
    display: block;
    font-size: 14pt;
    font-family: 'Boogaloo', cursive;
    color: var(--dark);
    margin-top: 2px;
    min-height: 22px;
    border-bottom: 1.5px solid #CCC;
  }

  /* ── WEEKLY CHORE GRID ── */
  .print-chore-section { margin-bottom: 20px; }
  .print-chore-title {
    font-family: 'Boogaloo', cursive;
    font-size: 13pt;
    margin-bottom: 8px;
    padding: 5px 10px;
    border-radius: 6px;
    color: white;
  }

  .print-grid-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Nunito', sans-serif;
  }
  .print-grid-table th {
    font-size: 9pt;
    font-weight: 800;
    text-align: center;
    padding: 6px 4px;
    border: 1.5px solid #DDD;
    width: 36px;
  }
  .print-grid-table th.chore-col {
    text-align: left;
    padding-left: 10px;
    width: auto;
  }
  .print-grid-table td {
    border: 1.5px solid #DDD;
    height: 32px;
    text-align: center;
    vertical-align: middle;
  }
  .print-grid-table td.chore-name {
    text-align: left;
    padding: 6px 10px;
    font-size: 9.5pt;
    font-weight: 700;
  }
  .print-checkbox {
    width: 18px;
    height: 18px;
    border: 2px solid #BBB;
    border-radius: 4px;
    display: inline-block;
    margin: auto;
  }
  /* Alternating row tint */
  .print-grid-table tr:nth-child(even) td { background: #FAFAFA; }

  /* ── POINTS TRACKER FOOTER ── */
  .print-points-footer {
    margin-top: 16px;
    display: flex !important;
    gap: 12px;
    align-items: center;
    border-top: 2px dashed #DDD;
    padding-top: 12px;
  }
  .print-points-label {
    font-family: 'Boogaloo', cursive;
    font-size: 12pt;
    color: #888;
  }
  .print-points-boxes {
    display: flex;
    gap: 8px;
  }
  .print-point-box {
    width: 36px; height: 36px;
    border: 2px solid #CCC;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 8pt;
    color: #BBB;
    font-weight: 800;
  }

  /* ── REWARDS (print compact) ── */
  .reward-card { border: 1.5px solid #CCC; page-break-inside: avoid; }
  .reward-grid { grid-template-columns: repeat(3, 1fr); }
  .card { box-shadow: none; border: 1.5px solid #CCC; margin-bottom: 10px; }
}

</style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <h1><span class="spin">☀️</span> Wolters Summer Vacation Points <span class="spin">☀️</span></h1>
  <p>Do your essentials. Earn your adventure. Spend your summer right.</p>
</header>

<div id="status-bar">⏳ Loading chore data...</div>

<!-- ── NAV ── -->
<nav id="nav">
  <button class="active" onclick="showTab('scoreboard')">🏆 Scoreboard</button>
  <button onclick="showTab('penelope')">🌸 Penelope</button>
  <button onclick="showTab('axel')">⚡ Axel</button>
  <button onclick="showTab('truett')">🐢 Truett</button>
  <button onclick="showTab('bonus')">⭐ Bonus Chores</button>
  <button onclick="showTab('rewards')">🎁 Rewards</button>
  <button onclick="showTab('award')">✨ Award Points</button>
  <button onclick="showTab('log')">📒 Log</button>
</nav>

<!-- ── MAIN ── -->

function logTx(kidId, emoji, desc, pts) {

}

// ══════════════════════════════════════════════════════
// SHEET FETCH  (public CSV export)
// ══════════════════════════════════════════════════════
function sheetUrl(tabName) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
}

async function fetchCSV(tab) {
  const r = await fetch(sheetUrl(tab), { cache: 'no-cache' });
  if (!r.ok) throw new Error(`Cannot load tab "${tab}"`);
  return parseCSV(await r.text());
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = csvRow(lines[0]);
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = csvRow(line);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  });
}

function csvRow(line) {
  const cols = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
    else { cur += c; }
  }
  cols.push(cur);
  return cols;
}

      fetchCSV('KIDS'),
      fetchCSV('ESSENTIALS'),
      fetchCSV('TRUETT_BONUS'),
      fetchCSV('BONUS_CHORES'),
      fetchCSV('REWARDS'),
      fetchCSV('POINTS'),

    DB.rewards     = rewards;

    points.forEach(r => DB.points[r.kid_id] = parseInt(r.points) || 0);
    setStatus('✓ Data loaded — edit your Google Sheet to update chores & rewards', 'ok');
    renderAll();
  } catch(e) {
    setStatus('⚠️ Could not load Sheet — check it is shared publicly. ' + e.message, 'error');
    loadDemoData();
    renderAll();
  }
}

function setStatus(msg, cls) {

      return `<div class="bonus-card${claimed?' claimed':''}" id="bc-${c.chore_id}">
        <div class="bonus-check">${claimed?'✓':''}</div>
        <div class="bonus-label">${c.chore_label}</div>
        <div class="pts-pill ${pillCls}">${pts} pt${pts>1?'s':''}</div>
        <select class="who-select" onchange="claimBonus('${c.chore_id}',this,${pts})">
          <option value="">${claimed && claimedKid ? claimedKid.emoji+' '+claimedKid.name : 'Who?'}</option>
          ${kidOptions}
          ${claimed ? '<option value="__unclaim">↩ Unclaim</option>' : ''}
        </select>
      </div>`;
    }).join('');
    html += `<div class="tier-heading" style="color:${tier.color}">${tier.label} <span style="font-size:0.8rem;color:#AAA;font-family:'Nunito',sans-serif;font-weight:700">${tier.range}</span></div>
      <div class="bonus-grid">${cards}</div>`;
  });
  html += `</div><button class="reset-btn" onclick="resetBonus()">↺ Reset All Bonus Chores</button>`;
  el.innerHTML = html;
}

// ── REWARDS ──
const REWARD_CATS = {
  food:       '🍦 Food & Treat Experiences',
  screen:     '🎬 Screen & Entertainment',
  home:       '🏕️ At-Home Experiences',
  outings:    '🎡 Outings & Adventures',
  privileges: '👑 Special Privileges',
  parent:     '❤️ Parent Time',
};

function renderRewards() {
  const el = document.getElementById('panel-rewards');
  let html = `<div style="background:linear-gradient(135deg,#C77DFF22,#FF6B6B11);border:2px solid #C77DFF44;border-radius:16px;padding:14px 18px;margin-bottom:20px;font-weight:700;color:#555;font-size:0.88rem;line-height:1.7">
    <strong style="color:#1A1A2E">🎁 The Rewards Store</strong> — spend your vacation points on something awesome.<br>
    <strong>Gift rule:</strong> you can spend your own points to buy a reward for a sibling 🤝 — giftable rewards are tagged.
  </div>`;

  Object.entries(REWARD_CATS).forEach(([cat, label]) => {
    const rewards = DB.rewards.filter(r => r.category === cat);
    if (!rewards.length) return;
    const cards = rewards.map(r => {
      const isGiftable = r.giftable === 'TRUE';
      return `<div class="reward-card">
        <div class="reward-icon">${r.icon}</div>
        <div class="reward-name">${r.name}${isGiftable?' <span class="tag tag-gift">🤝 giftable</span>':''}</div>
        <div class="reward-desc">${r.description}</div>
        <div class="reward-cost">
          <span class="cost-pill">${r.pts}</span>
          <span class="cost-label">points</span>
        </div>
      </div>`;
    }).join('');
    html += `<div style="margin-bottom:26px">
      <div class="tier-heading" style="font-family:'Boogaloo',cursive;font-size:1.2rem;margin-bottom:10px;padding-bottom:6px;border-bottom:2px dashed #EEE">${label}</div>
      <div class="reward-grid">${cards}</div>
    </div>`;
  });
  el.innerHTML = html;
}

// ══════════════════════════════════════════════════════
// INTERACTIVITY
// ══════════════════════════════════════════════════════
function toggleEssential(kidId, idx, total) {
  if (!essentialsDone[kidId]) essentialsDone[kidId] = [];
  const done = essentialsDone[kidId];
  const pos = done.indexOf(idx);
  if (pos > -1) done.splice(pos,1); else done.push(idx);
  sessionStorage.setItem('essentialsDone', JSON.stringify(essentialsDone));
  // Re-render just this kid's panel
  const kid = DB.kids.find(k => k.kid_id === kidId);
  renderKid(kid);
}

function resetEssentials(kidId, total) {
  essentialsDone[kidId] = [];
  sessionStorage.setItem('essentialsDone', JSON.stringify(essentialsDone));
  const kid = DB.kids.find(k => k.kid_id === kidId);
  renderKid(kid);
}

function toggleTruettBonus(idx, key, pts) {
  if (bonusClaimed[key]) {
    delete bonusClaimed[key];
    DB.points['truett'] = Math.max(0, (DB.points['truett']||0) - pts);
  } else {
    bonusClaimed[key] = true;
    DB.points['truett'] = (DB.points['truett']||0) + pts;
  }
  sessionStorage.setItem('bonusClaimed', JSON.stringify(bonusClaimed));
  renderKid(DB.kids.find(k=>k.kid_id==='truett'));
  renderScoreboard();
}

function resetTruettBonus() {
  DB.truettBonus.forEach((c,i) => {
    const key = 'truett_bonus_' + i;
    if (bonusClaimed[key]) {
      DB.points['truett'] = Math.max(0, (DB.points['truett']||0) - (parseInt(c.pts)||1));
      delete bonusClaimed[key];
    }
  });
  sessionStorage.setItem('bonusClaimed', JSON.stringify(bonusClaimed));
  renderKid(DB.kids.find(k=>k.kid_id==='truett'));
  renderScoreboard();
}

function claimBonus(choreId, selectEl, pts) {
  const val = selectEl.value;
  const prev = bonusClaimed[choreId];

  if (val === '__unclaim') {
    if (prev) {
      DB.points[prev] = Math.max(0, (DB.points[prev]||0) - pts);
      delete bonusClaimed[choreId];
    }
  } else if (val) {
    if (prev && prev !== val) {
      DB.points[prev] = Math.max(0, (DB.points[prev]||0) - pts);
    }
    if (!prev || prev !== val) {
      DB.points[val] = (DB.points[val]||0) + pts;
    }
    bonusClaimed[choreId] = val;
    const claimedKid = DB.kids.find(k=>k.kid_id===val);
    const chore = DB.bonusChores.find(c=>c.chore_id===choreId);
    if (chore) logTx(val, claimedKid?.emoji||'⭐', chore.chore_label, pts);
  }

  sessionStorage.setItem('bonusClaimed', JSON.stringify(bonusClaimed));
  // Update points displays without full re-render
  DB.kids.forEach(k => {
    const d = document.getElementById('pts-display-' + k.kid_id);
    if (d) d.textContent = DB.points[k.kid_id] || 0;
  });
  renderBonus();
  renderScoreboard();
}

function resetBonus() {
  Object.keys(bonusClaimed).forEach(key => {
    if (key.startsWith('b')) {
      const chore = DB.bonusChores.find(c => c.chore_id === key);
      if (chore && bonusClaimed[key]) {
        const kid = bonusClaimed[key];
        DB.points[kid] = Math.max(0, (DB.points[kid]||0) - (parseInt(chore.pts)||1));
      }
      delete bonusClaimed[key];
    }
  });
  sessionStorage.setItem('bonusClaimed', JSON.stringify(bonusClaimed));
  renderBonus();
  renderScoreboard();
  DB.kids.forEach(k => renderKid(k));
}

// ── AWARD POINTS ──
function renderAward() {
  const el = document.getElementById('panel-award');
  const kidToggles = DB.kids.map(k => `
    <div class="kid-toggle ${k.kid_id}" id="toggle-${k.kid_id}" onclick="toggleKidSelect('${k.kid_id}')">
      ${k.emoji} ${k.name}
    </div>`).join('');

  el.innerHTML = `
    <div class="card">
      <div class="section-title">✨ Award Discretionary Points</div>
      <div class="note">Use this to award points for anything not on the chore list — kindness, great attitude, helping without being asked, etc.</div>
      <div class="award-form">
        <div>
          <div style="font-size:0.78rem;font-weight:800;color:#AAA;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Who gets the points?</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px">
            ${kidToggles}
            <div class="kid-toggle" id="toggle-all" onclick="toggleKidSelect('all')" style="border-color:#FFD93D">
              ⭐ All Three
            </div>
          </div>
        </div>
        <div>
          <div style="font-size:0.78rem;font-weight:800;color:#AAA;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">What did they do?</div>
          <input class="award-input desc" id="award-desc" type="text" placeholder='e.g. "Being kind to siblings"' />
        </div>
        <div>
          <div style="font-size:0.78rem;font-weight:800;color:#AAA;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">How many points?</div>
          <div class="award-row">
            <input class="award-input pts" id="award-pts" type="number" min="1" max="50" value="5" />
            <span style="font-weight:800;color:#888">pts</span>
            <div style="display:flex;gap:6px;margin-left:4px">
              ${[1,2,3,5,10].map(n=>`<button onclick="document.getElementById('award-pts').value=${n}" style="font-family:'Boogaloo',cursive;font-size:0.9rem;padding:5px 10px;border-radius:8px;border:2px solid #EEE;background:white;cursor:pointer;transition:all 0.2s" onmouseover="this.style.borderColor='#FFD93D'" onmouseout="this.style.borderColor='#EEE'">${n}</button>`).join('')}
            </div>
          </div>
        </div>
        <button class="award-btn" onclick="submitAward()">✨ Award Points</button>
        <div id="award-confirm" style="text-align:center;font-weight:800;color:#2E7D32;font-size:0.9rem;min-height:20px"></div>
      </div>
    </div>`;
}

let selectedKids = new Set();

function toggleKidSelect(kidId) {
  if (kidId === 'all') {
    const allBtn = document.getElementById('toggle-all');
    if (selectedKids.size === DB.kids.length) {
      selectedKids.clear();
      allBtn.style.background = 'white';
      allBtn.style.borderColor = '#FFD93D';
      allBtn.style.color = 'inherit';
    } else {
      DB.kids.forEach(k => selectedKids.add(k.kid_id));
      allBtn.style.background = '#FFFDE7';
      allBtn.style.borderColor = '#FFD93D';
      allBtn.style.color = '#B8860B';
      DB.kids.forEach(k => {
        const el = document.getElementById('toggle-' + k.kid_id);
        if (el) el.classList.add('selected');
      });
    }
    return;
  }
  const btn = document.getElementById('toggle-' + kidId);
  if (selectedKids.has(kidId)) {
    selectedKids.delete(kidId);
    btn?.classList.remove('selected');
  } else {
    selectedKids.add(kidId);
    btn?.classList.add('selected');
  }
}

function submitAward() {
  const desc = document.getElementById('award-desc')?.value.trim();
  const pts  = parseInt(document.getElementById('award-pts')?.value) || 0;
  if (!desc) { alert('Add a description first.'); return; }
  if (!pts || pts < 1) { alert('Enter a point value.'); return; }
  if (selectedKids.size === 0) { alert('Select at least one kid.'); return; }

  selectedKids.forEach(kidId => {
    DB.points[kidId] = (DB.points[kidId]||0) + pts;
    const kid = DB.kids.find(k=>k.kid_id===kidId);
    logTx(kidId, kid?.emoji||'⭐', '✨ ' + desc, pts);
  });

  // Reset form
  document.getElementById('award-desc').value = '';
  document.getElementById('award-pts').value = '5';
  selectedKids.clear();
  DB.kids.forEach(k => document.getElementById('toggle-'+k.kid_id)?.classList.remove('selected'));
  const allBtn = document.getElementById('toggle-all');
  if (allBtn) { allBtn.style.background='white'; allBtn.style.borderColor='#FFD93D'; allBtn.style.color='inherit'; }

  const confirm = document.getElementById('award-confirm');
  if (confirm) { confirm.textContent = '✓ Points awarded!'; setTimeout(()=>confirm.textContent='', 2500); }

  renderScoreboard();
  DB.kids.forEach(k => renderKid(k));
}

// ── TRANSACTION LOG ──
let activeFilter = 'all';

function renderLog() {
  const el = document.getElementById('panel-log');
  if (!el) return;

  const filtered = activeFilter === 'all' ? txLog : txLog.filter(t => t.kidId === activeFilter);

  const filterBtns = [
    { id:'all', label:'👨‍👩‍👧‍👦 All Kids', cls:'' },
    ...DB.kids.map(k => ({ id:k.kid_id, label:`${k.emoji} ${k.name}`, cls:k.kid_id }))
  ].map(f => `<button class="filter-btn ${f.cls}${activeFilter===f.id?' active':''}" onclick="setLogFilter('${f.id}')">${f.label}</button>`).join('');

  const entries = filtered.length ? filtered.map(t => {
    const color = KID_COLORS[t.kidId] || '#AAA';
    const sign = t.pts > 0 ? '+' : '';
    const ptsCls = t.pts > 0 ? 'positive' : 'negative';
    return `<div class="log-entry">
      <div class="log-kid-dot" style="background:${color}"></div>
      <div class="log-emoji">${t.emoji}</div>
      <div class="log-desc">${t.desc}</div>
      <div class="log-date">${t.date}</div>
      <div class="log-pts ${ptsCls}">${sign}${t.pts}</div>
    </div>`;
  }).join('') : `<div class="empty-log">No entries yet — start earning! ☀️</div>`;

  const total = filtered.reduce((s,t)=>s+t.pts, 0);

  el.innerHTML = `
    <div class="card">
      <div class="section-title">📒 Transaction Log</div>
      <div class="log-filter-bar">${filterBtns}</div>
      ${filtered.length ? `<div style="font-size:0.78rem;font-weight:800;color:#AAA;text-align:right;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px">${filtered.length} entries · +${total} pts total</div>` : ''}
      ${entries}
    </div>
    <button class="reset-btn" onclick="clearLog()">🗑 Clear Log</button>`;
}

function setLogFilter(kidId) {
  activeFilter = kidId;
  renderLog();
}

function clearLog() {
  if (!confirm('Clear the entire transaction log? This cannot be undone.')) return;
  txLog = [];
  localStorage.setItem('wolters-tx-log', JSON.stringify(txLog));
  renderLog();
}

// ── TAB SWITCHER ──
function showTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  const btns = document.querySelectorAll('nav button');
  const map = ['scoreboard','penelope','axel','truett','bonus','rewards','award','log'];
  btns[map.indexOf(name)]?.classList.add('active');
}
